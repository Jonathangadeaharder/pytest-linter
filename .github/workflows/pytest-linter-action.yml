name: pytest-linter

on:
  workflow_call:
    inputs:
      path:
        description: "File or directory to lint"
        required: false
        default: "."
        type: string
      sarif-output:
        description: "Path for SARIF output file"
        required: false
        default: "results.sarif"
        type: string
      version:
        description: "pytest-linter version (defaults to latest release)"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  security-events: write

jobs:
  lint:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Determine latest version
        id: version
        if: inputs.version == ''
        run: |
          VERSION=$(curl -sfL https://api.github.com/repos/Jonathangadeaharder/pytest-linter/releases/latest | jq -r .tag_name)
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download pytest-linter binary
        run: |
          VERSION="${{ inputs.version || steps.version.outputs.value }}"
          BASE_URL="https://github.com/Jonathangadeaharder/pytest-linter/releases/download/${VERSION}"
          ARCHIVE="pytest-linter-x86_64-unknown-linux-gnu.tar.gz"
          curl -fSL -o "${ARCHIVE}" "${BASE_URL}/${ARCHIVE}"
          curl -fSL -o "${ARCHIVE}.sha256" "${BASE_URL}/${ARCHIVE}.sha256"
          sha256sum -c "${ARCHIVE}.sha256"
          tar xzf "${ARCHIVE}"
          chmod +x pytest-linter

      - name: Run pytest-linter
        run: |
          ./pytest-linter \
            --format sarif \
            --output ${{ inputs.sarif-output }} \
            ${{ inputs.path }} || true

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ${{ inputs.sarif-output }}
          category: pytest-linter
