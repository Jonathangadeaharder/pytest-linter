name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format check pytest-linter
        run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy pytest-linter
        run: cargo +nightly clippy --lib -- -W clippy::all -W clippy::pedantic -W clippy::nursery

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test pytest-linter
        run: cargo test

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Coverage pytest-linter
        run: cargo +nightly llvm-cov --fail-under-lines 90

  dogfood:
    name: Dogfood
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --release
      - name: Create pytest test file with smells
        run: |
          cat > /tmp/test_smell.py << 'PYEOF'
          import time
          import requests

          def test_bad():
              time.sleep(5)
              with open("data.txt") as f:
                  content = f.read()
              assert True
          PYEOF
      - name: Run pytest-linter on smell file
        run: |
          ./target/release/pytest-linter --format json /tmp/test_smell.py > /tmp/pytest-result.json
          violations=$(python3 -c "import json,sys; print(len(json.load(sys.stdin)))" < /tmp/pytest-result.json)
          echo "pytest-linter found $violations violations"
          [ "$violations" -gt 0 ]
