name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: pytest-linter
            asset_name: pytest-linter-x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: pytest-linter
            asset_name: pytest-linter-aarch64-unknown-linux-gnu
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: pytest-linter
            asset_name: pytest-linter-x86_64-apple-darwin
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: pytest-linter
            asset_name: pytest-linter-aarch64-apple-darwin
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: pytest-linter.exe
            asset_name: pytest-linter-x86_64-pc-windows-msvc.exe

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} staging/
          cd staging
          tar czf ${{ matrix.asset_name }}.tar.gz ${{ matrix.artifact_name }}
          shasum -a 256 ${{ matrix.asset_name }}.tar.gz > ${{ matrix.asset_name }}.tar.gz.sha256

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          mkdir staging
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} staging/
          cd staging
          Compress-Archive -Path "${{ matrix.artifact_name }}" -DestinationPath "${{ matrix.asset_name }}.zip"
          $hash = (Get-FileHash -Algorithm SHA256 "${{ matrix.asset_name }}.zip").Hash
          "$hash  ${{ matrix.asset_name }}.zip" | Out-File -Encoding ascii "${{ matrix.asset_name }}.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: staging/*

  release:
    name: Create Release
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Install cosign
        uses: sigstore/cosign-installer@main

      - name: Sign artifacts with Sigstore
        run: |
          cd artifacts
          for f in *.tar.gz *.zip; do
            if [ -f "$f" ]; then
              cosign sign-blob --yes "$f" --output-signature "$f.sig" --output-certificate "$f.pem"
            fi
          done

      - name: Generate provenance attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: artifacts/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
